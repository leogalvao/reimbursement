/* ───── Utility functions ───── */
function genId() { return Math.random().toString(36).slice(2, 10); }

function formatCurrency(val) {
  const num = parseFloat(val);
  if (isNaN(num)) return '';
  return num.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}

function parseCurrency(str) {
  if (!str) return 0;
  const cleaned = String(str).replace(/[^0-9.\-]/g, '');
  return parseFloat(cleaned) || 0;
}

function extractAmountFromText(text) {
  // Match dollar amounts: $1,234.56 or 1,234.56 or 1234.56
  const patterns = [
    /\$\s?([\d,]+\.?\d{0,2})/g,
    /(?:total|amount|due|subtotal|balance|grand\s*total)[:\s]*\$?\s?([\d,]+\.?\d{0,2})/gi,
    /([\d,]+\.\d{2})/g,
  ];
  
  let amounts = [];
  for (const pattern of patterns) {
    let m;
    while ((m = pattern.exec(text)) !== null) {
      const val = parseFloat(m[1].replace(/,/g, ''));
      if (val > 0 && val < 1000000) amounts.push(val);
    }
  }
  // Return the largest amount found (usually the total)
  if (amounts.length === 0) return '';
  amounts.sort((a, b) => b - a);
  return amounts[0].toFixed(2);
}

function extractDateFromText(text) {
  const patterns = [
    /(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/g,
    /(\w+)\s+(\d{1,2}),?\s+(\d{4})/g,
    /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/g,
  ];
  
  // MM/DD/YYYY or MM-DD-YYYY
  let m = patterns[0].exec(text);
  if (m) {
    let [, a, b, c] = m;
    if (c.length === 2) c = '20' + c;
    const month = a.padStart(2, '0');
    const day = b.padStart(2, '0');
    return `${month}/${day}/${c}`;
  }
  
  // Month DD, YYYY
  const months = { jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12' };
  m = patterns[1].exec(text);
  if (m) {
    const mon = months[m[1].toLowerCase().slice(0,3)];
    if (mon) return `${mon}/${m[2].padStart(2,'0')}/${m[3]}`;
  }
  
  // YYYY-MM-DD
  m = patterns[2].exec(text);
  if (m) return `${m[2].padStart(2,'0')}/${m[3].padStart(2,'0')}/${m[1]}`;
  
  return '';
}

async function fileToImageUrl(file) {
  if (file.type === 'application/pdf') {
    // For PDFs, we'll use a canvas placeholder approach
    return URL.createObjectURL(file);
  }
  return URL.createObjectURL(file);
}

async function pdfPageToImageData(file) {
  try {
    if (!window.pdfjsLib) return null;
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 2.0 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    return canvas.toDataURL('image/png');
  } catch (e) {
    console.warn('PDF rendering failed:', e);
    return null;
  }
}

async function fileToImageData(file) {
  if (file.type === 'application/pdf') {
    return await pdfPageToImageData(file);
  }
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

/* ───── LocalStorage Persistence ───── */
const STORAGE_KEY = 'reimbursement_report_v1';

function saveToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { console.warn('Failed to save to localStorage:', e); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { console.warn('Failed to load from localStorage:', e); return null; }
}

function clearStorage() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

function compressThumbnail(dataUrl, maxWidth = 1200, quality = 0.7) {
  return new Promise((resolve) => {
    if (!dataUrl || !dataUrl.startsWith('data:image')) { resolve(dataUrl); return; }
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

/* ───── Validators ───── */
function validateAmount(val) {
  if (!val || val.trim() === '') return { valid: true, cleaned: '' };
  const cleaned = val.replace(/[^0-9.\-]/g, '');
  const num = parseFloat(cleaned);
  if (isNaN(num)) return { valid: false };
  return { valid: true, cleaned: num.toFixed(2) };
}

function validateDate(val) {
  if (!val || val.trim() === '') return { valid: true, cleaned: '' };
  const match = val.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!match) return { valid: false };
  const [, m, d, y] = match;
  const month = parseInt(m, 10), day = parseInt(d, 10), year = parseInt(y, 10);
  if (month < 1 || month > 12 || day < 1 || day > 31 || year < 1900 || year > 2100) return { valid: false };
  return { valid: true, cleaned: `${m.padStart(2, '0')}/${d.padStart(2, '0')}/${y}` };
}

/* ───── Lazy Tesseract Loader ───── */
let tesseractLoadPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve();
  if (tesseractLoadPromise) return tesseractLoadPromise;
  tesseractLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js';
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return tesseractLoadPromise;
}

      inputRef.current.select();

    return (

        ref={inputRef}
        type="text"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        onBlur={() => setEditing(false)}
        onKeyDown={(e) => e.key === 'Enter' && setEditing(false)}

          fontSize: '22px',
          fontWeight: 600,

          width: '100%',
          maxWidth: '500px',

    );
  }

/* ───── Upload Zone ───── */
function UploadZone({ onFiles, processing, fileCount }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const files = Array.from(e.dataTransfer.files).filter(f =>
      f.type.startsWith('image/') || f.type === 'application/pdf'
    );
    if (files.length) onFiles(files);
  }, [onFiles]);

  const handleChange = (e) => {
    const files = Array.from(e.target.files);
    if (files.length) onFiles(files);
    e.target.value = '';
  };

  return (
    <div
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={handleDrop}
      onClick={() => !processing && inputRef.current.click()}
      className="fade-in"
      style={{
        border: `2px dashed ${dragOver ? 'var(--accent)' : 'var(--border-strong)'}`,
        borderRadius: '12px',
        padding: processing ? '28px' : '36px 28px',
        textAlign: 'center',
        cursor: processing ? 'default' : 'pointer',
        background: dragOver ? 'var(--accent-soft)' : 'var(--surface-alt)',
        transition: 'all 0.25s ease',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      <input
        ref={inputRef}
        type="file"
        multiple
        accept="image/jpeg,image/png,application/pdf"
        onChange={handleChange}
        style={{ display: 'none' }}
      />
      {processing ? (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '12px' }}>
          <Icons.Loader />
          <span style={{ color: 'var(--text-secondary)', fontSize: '14px', fontWeight: 500 }}>
            Processing receipts with OCR…
          </span>
        </div>
      ) : (
        <div>
          <div style={{
            width: '48px', height: '48px', borderRadius: '50%',
            background: 'var(--accent-soft)', display: 'flex', alignItems: 'center',
            justifyContent: 'center', margin: '0 auto 14px', color: 'var(--accent)',
          }}>
            <Icons.Upload />
          </div>
          <p style={{ fontSize: '15px', fontWeight: 500, marginBottom: '4px' }}>
            Drop receipts here or <span style={{ color: 'var(--accent)', textDecoration: 'underline' }}>browse files</span>
          </p>
          <p style={{ fontSize: '13px', color: 'var(--text-tertiary)' }}>
            JPEG, PNG, or PDF — multiple files supported
          </p>
          {fileCount > 0 && (
            <p style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginTop: '8px' }}>
              {fileCount} receipt{fileCount > 1 ? 's' : ''} loaded
            </p>
          )}
        </div>
      )}
    </div>
  );
}

/* ───── Processing Queue ───── */
function ProcessingQueue({ queue }) {
  if (!queue.length) return null;
  return (
    <div className="slide-up" style={{
      background: 'var(--surface)', border: '1px solid var(--border)',
      borderRadius: 'var(--radius)', padding: '14px 16px',
    }}>
      <p style={{ fontSize: '12px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', marginBottom: '10px' }}>
        OCR Queue
      </p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
        {queue.map((item) => (
          <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', fontSize: '13px' }}>
            {item.status === 'processing' ? (
              <span style={{ color: 'var(--accent)' }}><Icons.Loader /></span>
            ) : item.status === 'done' ? (
              <span style={{ color: 'var(--success)' }}><Icons.Check /></span>
            ) : (
              <span style={{ color: 'var(--text-tertiary)', opacity: 0.4 }}>○</span>
            )}
            <span style={{ color: item.status === 'done' ? 'var(--text-tertiary)' : 'var(--text-primary)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {item.name}
            </span>
            {item.status === 'done' && item.amount && (
              <span style={{ fontFamily: 'var(--mono)', fontSize: '12px', color: 'var(--success)' }}>
                {formatCurrency(item.amount)}
              </span>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ───── Editable Cell ───── */
function EditableCell({ value, onChange, type = 'text', placeholder = '', align = 'left', mono = false, validate }) {
  const [editing, setEditing] = useState(false);
  const [localVal, setLocalVal] = useState(value);
  const [validationError, setValidationError] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { setLocalVal(value); }, [value]);
  useEffect(() => {
    if (validate && value) { setValidationError(!validate(value).valid); }
    else { setValidationError(false); }
  }, [value]);
  useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [editing]);

  const commit = () => {
    setEditing(false);
    if (localVal !== value) {
      if (validate) {
        const result = validate(localVal);
        setValidationError(!result.valid);
        onChange(result.valid && result.cleaned !== undefined ? result.cleaned : localVal);
      } else {
        setValidationError(false);
        onChange(localVal);
      }
    }
  };

  const displayValue = type === 'accounting' && value ? formatCurrency(value) : value;

  if (editing) {
    return (
      <input
        ref={inputRef}
        type="text"
        value={localVal}
        onChange={(e) => setLocalVal(e.target.value)}
        onBlur={commit}
        onKeyDown={(e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') { setLocalVal(value); setEditing(false); } }}
        placeholder={placeholder}
        style={{
          width: '100%', padding: '4px 6px', fontSize: '13px',
          fontFamily: mono ? 'var(--mono)' : 'var(--sans)',
          border: '1.5px solid var(--accent)', borderRadius: '4px',
          outline: 'none', textAlign: align, background: '#fff',
        }}
      />
    );
  }

  return (
    <div
      onClick={() => setEditing(true)}
      style={{
        padding: '4px 6px', cursor: 'text', minHeight: '28px',
        fontSize: '13px', textAlign: align, borderRadius: '4px',
        fontFamily: mono ? 'var(--mono)' : 'var(--sans)',
        color: displayValue ? 'var(--text-primary)' : 'var(--text-tertiary)',
        transition: 'all 0.15s',
        border: validationError ? '1.5px solid var(--danger)' : '1.5px solid transparent',
      }}
      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(198,122,46,0.06)'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
    >
      {displayValue || placeholder}
    </div>
  );
}

/* ───── Select Cell (for dropdowns) ───── */
function SelectCell({ value, onChange, options, placeholder = 'Select…' }) {

/* ───── PDF Generator ───── */
async function generatePDF(title, rows, receiptImages, header = {}) {
  const { companyName = '', employeeName = '', department = '', reportDate = '' } = header;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'letter');
  const pageW = 215.9;
  const pageH = 279.4;
  const margin = 18;
  const contentW = pageW - 2 * margin;
  let y = margin;

  // --- Helpers ---
  const addFooter = (pageNum) => {
    doc.setFontSize(8);
    doc.setTextColor(160, 155, 145);
    doc.text(`Page ${pageNum}`, pageW / 2, pageH - 10, { align: 'center' });
    doc.text(new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }), pageW - margin, pageH - 10, { align: 'right' });
  };

  // --- Page 1: Report ---
  // Header bar
  doc.setFillColor(26, 23, 20);
  doc.rect(0, 0, pageW, 36, 'F');
  // Company name
  if (companyName) {
    doc.setFontSize(11);
    doc.setTextColor(200, 195, 185);
    doc.setFont('helvetica', 'normal');
    doc.text(companyName, margin, 13);
  }
  // Report title
  doc.setFontSize(16);
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.text(title, margin, companyName ? 26 : 22);

  // Subtitle line with employee/department/date
  y = 46;
  doc.setFontSize(9);
  doc.setTextColor(120, 115, 105);
  doc.setFont('helvetica', 'normal');
  const subtitleParts = [];
  if (employeeName) subtitleParts.push(employeeName);
  if (department) subtitleParts.push(department);
  if (reportDate) subtitleParts.push(reportDate);
  subtitleParts.push(`${rows.length} receipt${rows.length !== 1 ? 's' : ''}`);
  doc.text(subtitleParts.join('  •  '), margin, y);
  y += 10;

  // Table
  const cols = [
    { key: 'vendor', label: 'Vendor', w: 38 },
    { key: 'amount', label: 'Amount', w: 22, align: 'right' },
    { key: 'date', label: 'Date', w: 22 },
    { key: 'project', label: 'Project', w: 30 },
    { key: 'reason', label: 'Reason', w: 42 },
    { key: 'costCode', label: 'Cost Code', w: 20 },
    { key: 'category', label: 'Category', w: 24 },
  ];
  const totalW = cols.reduce((s, c) => s + c.w, 0);
  const scale = contentW / totalW;
  cols.forEach(c => c.w *= scale);

  // Table header
  doc.setFillColor(245, 243, 239);
  doc.rect(margin, y, contentW, 8, 'F');
  doc.setFontSize(7.5);
  doc.setTextColor(106, 97, 88);
  doc.setFont('helvetica', 'bold');
  let x = margin;
  cols.forEach(c => {
    doc.text(c.label.toUpperCase(), c.align === 'right' ? x + c.w - 2 : x + 2, y + 5.5, { align: c.align === 'right' ? 'right' : 'left' });
    x += c.w;
  });
  y += 8;

  // Table rows
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  rows.forEach((row, i) => {
    if (y > pageH - 40) {
      addFooter(doc.getNumberOfPages());
      doc.addPage();
      y = margin;
    }
    if (i % 2 === 0) {
      doc.setFillColor(250, 249, 247);
      doc.rect(margin, y, contentW, 7, 'F');
    }
    doc.setTextColor(40, 37, 32);
    x = margin;
    cols.forEach(c => {
      let val = row[c.key] || '';
      if (c.key === 'amount' && val) val = formatCurrency(val);
      // Truncate long text
      const maxChars = Math.floor(c.w / 1.8);
      if (val.length > maxChars) val = val.substring(0, maxChars - 1) + '…';
      doc.text(val, c.align === 'right' ? x + c.w - 2 : x + 2, y + 5, { align: c.align === 'right' ? 'right' : 'left' });
      x += c.w;
    });
    y += 7;
  });

  // Total row
  y += 2;
  doc.setDrawColor(26, 23, 20);
  doc.setLineWidth(0.5);
  doc.line(margin, y, margin + contentW, y);
  y += 6;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(26, 23, 20);
  const total = rows.reduce((s, r) => s + parseCurrency(r.amount), 0);
  doc.text('GRAND TOTAL', margin + 2, y);
  doc.setTextColor(198, 122, 46);
  const amountX = margin + cols[0].w + cols[1].w - 2;
  doc.text(formatCurrency(total), amountX, y, { align: 'right' });

  addFooter(1);

  // --- Merge attachments using pdf-lib ---
  const { PDFDocument } = PDFLib;
  const reportBytes = doc.output('arraybuffer');
  const merged = await PDFDocument.load(reportBytes);

  for (const img of receiptImages) {
    try {
      if (img.file && img.file.type === 'application/pdf') {
        const pdfBytes = await img.file.arrayBuffer();
        const srcDoc = await PDFDocument.load(pdfBytes);
        const copiedPages = await merged.copyPages(srcDoc, srcDoc.getPageIndices());
        copiedPages.forEach(page => merged.addPage(page));
      } else if (img.dataUrl) {
        const isJpeg = img.dataUrl.startsWith('data:image/jpeg');
        const base64 = img.dataUrl.split(',')[1];
        const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const embedFn = isJpeg ? merged.embedJpg.bind(merged) : merged.embedPng.bind(merged);
        const image = await embedFn(bytes);
        const dims = image.scale(1);
        const page = merged.addPage([dims.width, dims.height]);
        page.drawImage(image, { x: 0, y: 0, width: dims.width, height: dims.height });
      }
    } catch (e) {
      console.warn('Failed to attach receipt:', img.name, e);
    }
  }

  const finalBytes = await merged.save();
  const blob = new Blob([finalBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${title.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_')}.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ───── Lightbox ───── */
function Lightbox({ images, currentIndex, onClose, onNavigate }) {
  const [zoom, setZoom] = useState(1);

  useEffect(() => { setZoom(1); }, [currentIndex]);

  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') onNavigate(-1);
      if (e.key === 'ArrowRight') onNavigate(1);
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [onClose, onNavigate]);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    setZoom(prev => Math.max(0.5, Math.min(5, prev + (e.deltaY > 0 ? -0.2 : 0.2))));
  }, []);

  const current = images[currentIndex];
  if (!current) return null;

  const navBtnStyle = {
    position: 'absolute', top: '50%', transform: 'translateY(-50%)',
    background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff',
    width: '40px', height: '40px', borderRadius: '50%',
    fontSize: '20px', cursor: 'pointer', display: 'flex',
    alignItems: 'center', justifyContent: 'center',
    transition: 'background 0.2s',
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 9999,
      background: 'rgba(0,0,0,0.85)', display: 'flex',
      alignItems: 'center', justifyContent: 'center',
    }}>
      <button onClick={onClose} style={{
        position: 'absolute', top: '16px', right: '16px',
        background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff',
        width: '36px', height: '36px', borderRadius: '50%',
        fontSize: '18px', cursor: 'pointer', zIndex: 1,
      }}>&times;</button>

      {currentIndex > 0 && (
        <button onClick={(e) => { e.stopPropagation(); onNavigate(-1); }}
          style={{ ...navBtnStyle, left: '16px' }}
          onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.3)'}
          onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.15)'}
        >&#8592;</button>
      )}

      <div onClick={(e) => e.stopPropagation()} onWheel={handleWheel}
        style={{ overflow: 'auto', maxWidth: '90vw', maxHeight: '90vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {current.dataUrl ? (
          <img src={current.dataUrl} alt={current.name}
            style={{ transform: `scale(${zoom})`, transformOrigin: 'center center', transition: 'transform 0.1s', maxWidth: '90vw', maxHeight: '90vh' }} />
        ) : (
          <div style={{ color: '#fff', padding: '40px', fontFamily: 'var(--sans)' }}>No preview available</div>
        )}
      </div>

      {currentIndex < images.length - 1 && (
        <button onClick={(e) => { e.stopPropagation(); onNavigate(1); }}
          style={{ ...navBtnStyle, right: '16px' }}
          onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.3)'}
          onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.15)'}
        >&#8594;</button>
      )}

      <div style={{
        position: 'absolute', bottom: '16px', left: '50%', transform: 'translateX(-50%)',
        color: 'rgba(255,255,255,0.7)', fontSize: '13px', fontFamily: 'var(--sans)',
      }}>{currentIndex + 1} / {images.length}</div>
    </div>
  );
}

/* ───── CSV Export ───── */
function generateCSV(rows, header = {}) {
  const escapeCSV = (val) => {
    const str = String(val || '');
    if (str.includes('"') || str.includes(',') || str.includes('\n')) return '"' + str.replace(/"/g, '""') + '"';
    return str;
  };
  const columns = ['Vendor', 'Amount', 'Date', 'Category', 'Project', 'Reason', 'Cost Code'];
  const keys = ['vendor', 'amount', 'date', 'category', 'project', 'reason', 'costCode'];
  let csv = columns.map(escapeCSV).join(',') + '\n';
  rows.forEach(row => { csv += keys.map(k => escapeCSV(row[k])).join(',') + '\n'; });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(header.title || 'expense_report').replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

}

/* ───── Main App ───── */
function App() {
  const savedData = useMemo(() => loadFromStorage(), []);

  const [title, setTitle] = useState(savedData?.title || 'Expense Reimbursement Report');
  const [companyName, setCompanyName] = useState(savedData?.companyName || 'Company Name');
  const [employeeName, setEmployeeName] = useState(savedData?.employeeName || '');
  const [department, setDepartment] = useState(savedData?.department || '');
  const [reportDate, setReportDate] = useState(savedData?.reportDate || new Date().toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }));
  const [rows, setRows] = useState(savedData?.rows || []);
  const [receiptFiles, setReceiptFiles] = useState(savedData?.receiptFiles || []);
  const [processing, setProcessing] = useState(false);
  const [queue, setQueue] = useState([]);
  const [generating, setGenerating] = useState(false);
  const [deletedItem, setDeletedItem] = useState(null);
  const [highlightedId, setHighlightedId] = useState(null);
  const [lightboxIndex, setLightboxIndex] = useState(null);

  const updateRow = useCallback((id, key, val) => {
    setRows(prev => prev.map(r => r.id === id ? { ...r, [key]: val } : r));
  }, []);

  const deleteRow = useCallback((id) => {
    setRows(prev => {
      const index = prev.findIndex(r => r.id === id);
      if (index < 0) return prev;
      const row = prev[index];
      const receipt = receiptFiles.find(r => r.id === id) || null;
      setDeletedItem({ row, receipt, index });
      return prev.filter(r => r.id !== id);
    });
    setReceiptFiles(prev => prev.filter(r => r.id !== id));
  }, [receiptFiles]);

  const undoDelete = useCallback(() => {
    if (!deletedItem) return;
    const { row, receipt, index } = deletedItem;
    setRows(prev => { const next = [...prev]; next.splice(Math.min(index, next.length), 0, row); return next; });
    if (receipt) {
      setReceiptFiles(prev => { const next = [...prev]; next.splice(Math.min(index, next.length), 0, receipt); return next; });
    }
    setDeletedItem(null);
  }, [deletedItem]);

  const addEmptyRow = useCallback(() => {
    const id = genId();
    setRows(prev => [...prev, { id, vendor: '', amount: '', date: '', project: '', reason: '', costCode: '', category: '' }]);
  }, []);

  // Debounced localStorage save
  const saveTimerRef = useRef(null);
  useEffect(() => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      const compressedReceipts = await Promise.all(
        receiptFiles.map(async (rf) => ({
          id: rf.id, name: rf.name,
          dataUrl: await compressThumbnail(rf.dataUrl),
        }))
      );
      saveToStorage({ title, companyName, employeeName, department, reportDate, rows, receiptFiles: compressedReceipts });
    }, 800);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [title, companyName, employeeName, department, reportDate, rows, receiptFiles]);

  const handleFiles = useCallback(async (files) => {
    setProcessing(true);

    // Lazy-load Tesseract on first upload
    setQueue([{ id: 'loading-ocr', name: 'Loading OCR engine…', status: 'processing', amount: null }]);
    try { await loadTesseract(); } catch (e) { console.warn('Failed to load Tesseract:', e); }

    const queueItems = files.map(f => ({ id: genId(), name: f.name, status: 'pending', amount: null }));
    setQueue(queueItems);

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const qItem = queueItems[i];

      setQueue(prev => prev.map(q => q.id === qItem.id ? { ...q, status: 'processing' } : q));

      let amount = '';
      let date = '';

      try {
        if (window.Tesseract && file.type.startsWith('image/')) {
          const result = await Tesseract.recognize(file, 'eng', {
            logger: () => {},
          });
          const text = result.data.text;
          amount = extractAmountFromText(text);
          date = extractDateFromText(text);
        } else if (window.Tesseract && file.type === 'application/pdf') {
          const pdfImage = await pdfPageToImageData(file);
          if (pdfImage) {
            const result = await Tesseract.recognize(pdfImage, 'eng', { logger: () => {} });
            const text = result.data.text;
            amount = extractAmountFromText(text);
            date = extractDateFromText(text);
          }
        }
      } catch (e) {
        console.warn('OCR failed for', file.name, e);
      }

      const imageData = await fileToImageData(file);
      const id = qItem.id;

      setReceiptFiles(prev => [...prev, { id, file, dataUrl: imageData, name: file.name }]);
      setRows(prev => [...prev, { id, vendor: '', amount, date, project: '', reason: '', costCode: '', category: '' }]);
      setQueue(prev => prev.map(q => q.id === qItem.id ? { ...q, status: 'done', amount } : q));
    }

    setProcessing(false);
    // Clear queue after a brief moment
    setTimeout(() => setQueue([]), 2000);
  }, []);

  const handleDownload = useCallback(async () => {
    if (rows.length === 0) return;
    setGenerating(true);
    try {
      await generatePDF(title, rows, receiptFiles, { companyName, employeeName, department, reportDate });
    } catch (e) {
      console.error('PDF generation failed:', e);
      alert('PDF generation encountered an error. Please try again.');
    }
    setGenerating(false);
  }, [title, rows, receiptFiles, companyName, employeeName, department, reportDate]);

  const total = useMemo(() => rows.reduce((s, r) => s + parseCurrency(r.amount), 0), [rows]);

  return (
    <div style={{ maxWidth: '960px', margin: '0 auto', padding: '24px 16px 60px' }}>
      {/* Report Header */}
      <div className="fade-in" style={{
        background: 'var(--surface)', borderRadius: '12px',
        border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)',
        overflow: 'hidden', marginBottom: '24px',
        borderLeft: '4px solid var(--accent)',
      }}>
        <div style={{ padding: '18px 20px' }}>
          {/* Top row: icon + title + summary badge */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '12px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{
                width: '36px', height: '36px', borderRadius: '10px',
                background: 'linear-gradient(135deg, #c67a2e, #e6a356)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: '#fff', boxShadow: '0 2px 8px rgba(198,122,46,0.3)',
              }}>
                <Icons.Receipt />
              </div>
              <EditableTitle value={title} onChange={setTitle} />
            </div>
            {rows.length > 0 && (
              <div className="fade-in" style={{
                fontSize: '13px', color: 'var(--text-secondary)',
                padding: '6px 12px', background: 'var(--surface-alt)',
                borderRadius: 'var(--radius)', border: '1px solid var(--border)',
                fontFamily: 'var(--mono)',
              }}>
                {rows.length} item{rows.length !== 1 ? 's' : ''} · <span style={{ color: 'var(--accent)', fontWeight: 600 }}>{formatCurrency(total)}</span>
              </div>
            )}
          </div>

          {/* Divider */}
          <div style={{ borderTop: '1px solid var(--border)', margin: '14px 0' }} />

          {/* Company info fields */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
            <EditableField label="Company" value={companyName} onChange={setCompanyName} fontSize="14px" fontWeight={600} placeholder="Company Name" />
            <EditableField label="Employee" value={employeeName} onChange={setEmployeeName} placeholder="Employee Name" />
            <EditableField label="Department" value={department} onChange={setDepartment} placeholder="Department" />
            <EditableField label="Date" value={reportDate} onChange={setReportDate} placeholder="MM/DD/YYYY" />
          </div>
        </div>
      </div>

      {/* Upload */}
      <div style={{ marginBottom: '20px' }}>
        <UploadZone onFiles={handleFiles} processing={processing} fileCount={receiptFiles.length} />
      </div>

      {/* Processing Queue */}
      {queue.length > 0 && (
        <div style={{ marginBottom: '20px' }}>
          <ProcessingQueue queue={queue} />
        </div>
      )}

      {/* Table Card */}
      <div className="fade-in" style={{
        background: 'var(--surface)', borderRadius: '12px',
        border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)',
        overflow: 'hidden', marginBottom: '20px',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 18px', borderBottom: '1px solid var(--border)',
          background: 'var(--surface-alt)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            <Icons.FileText />
            <span style={{ fontSize: '14px', fontWeight: 600 }}>Expense Details</span>
          </div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button
              onClick={addEmptyRow}
              style={{
                display: 'flex', alignItems: 'center', gap: '4px',
                background: 'none', border: '1px solid var(--border)',
                borderRadius: 'var(--radius)', padding: '5px 10px',
                fontSize: '12px', fontWeight: 500, cursor: 'pointer',
                color: 'var(--text-secondary)', transition: 'all 0.15s',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--accent)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
            >
              <Icons.Plus /> Add Row
            </button>
            <button
              onClick={() => {
                if (window.confirm('Clear all data? This cannot be undone.')) {
                  setRows([]); setReceiptFiles([]);
                  setTitle('Expense Reimbursement Report'); setCompanyName('Company Name');
                  setEmployeeName(''); setDepartment('');
                  setReportDate(new Date().toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }));
                  clearStorage();
                }
              }}
              style={{
                display: 'flex', alignItems: 'center', gap: '4px',
                background: 'none', border: '1px solid var(--border)',
                borderRadius: 'var(--radius)', padding: '5px 10px',
                fontSize: '12px', fontWeight: 500, cursor: 'pointer',
                color: 'var(--text-secondary)', transition: 'all 0.15s',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = 'var(--danger)'; e.currentTarget.style.color = 'var(--danger)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
            >
              <Icons.Trash /> Clear All
            </button>
          </div>
        </div>
        <div style={{ padding: '0 18px 14px' }}>
          <DataTable rows={rows} onUpdateRow={updateRow} onDeleteRow={deleteRow} highlightedId={highlightedId} onHighlightRow={setHighlightedId} />
        </div>
      </div>

      {/* Receipt Thumbnails */}
      {receiptFiles.length > 0 && (
        <div className="fade-in" style={{
          background: 'var(--surface)', borderRadius: '12px',
          border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)',
          overflow: 'hidden', marginBottom: '20px',
        }}>
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            background: 'var(--surface-alt)', display: 'flex', alignItems: 'center', gap: '8px',
          }}>
            <Icons.Image />
            <span style={{ fontSize: '14px', fontWeight: 600 }}>Uploaded Receipts</span>
            <span style={{
              fontSize: '11px', fontWeight: 600, background: 'var(--accent-soft)',
              color: 'var(--accent)', padding: '2px 8px', borderRadius: '99px',
            }}>{receiptFiles.length}</span>
          </div>
          <div style={{ padding: '16px 18px', display: 'flex', flexWrap: 'wrap', gap: '12px' }}>
            {receiptFiles.map((rf, i) => {
              const rowIndex = rows.findIndex(r => r.id === rf.id);
              return (
                <div key={rf.id} className="slide-up"
                  onMouseEnter={() => setHighlightedId(rf.id)}
                  onMouseLeave={() => setHighlightedId(null)}
                  style={{
                    animationDelay: `${i * 60}ms`,
                    width: '100px', borderRadius: '8px', overflow: 'hidden', position: 'relative',
                    border: highlightedId === rf.id ? '2px solid var(--accent)' : '1px solid var(--border)',
                    background: 'var(--surface-alt)', cursor: 'pointer', transition: 'border 0.2s',
                  }}
                >
                  {rowIndex >= 0 && (
                    <div
                      onClick={(e) => {
                        e.stopPropagation();
                        const el = document.querySelector(`[data-row-id="${rf.id}"]`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }}
                      style={{
                        position: 'absolute', top: '4px', left: '4px', zIndex: 1,
                        width: '20px', height: '20px', borderRadius: '50%',
                        background: 'var(--accent)', color: '#fff',
                        fontSize: '11px', fontWeight: 700,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        boxShadow: 'var(--shadow-sm)', cursor: 'pointer',
                      }}
                      title={`Go to row ${rowIndex + 1}`}
                    >{rowIndex + 1}</div>
                  )}
                  <div onClick={() => setLightboxIndex(i)}>
                    {rf.dataUrl ? (
                      <img src={rf.dataUrl} alt={rf.name} style={{ width: '100%', height: '80px', objectFit: 'cover' }} />
                    ) : (
                      <div style={{ width: '100%', height: '80px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-tertiary)' }}>
                        <Icons.FileText />
                      </div>
                    )}
                  </div>
                  <div style={{
                    padding: '4px 6px', fontSize: '10px', color: 'var(--text-tertiary)',
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textAlign: 'center',
                  }}>
                    {rf.name}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Download */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '10px' }}>
        <button
          onClick={() => generateCSV(rows, { title })}
          disabled={rows.length === 0}
          style={{
            display: 'flex', alignItems: 'center', gap: '8px',
            padding: '12px 20px', borderRadius: '10px',
            background: 'var(--surface)', border: '1px solid var(--border)',
            color: rows.length === 0 ? 'var(--text-tertiary)' : 'var(--text-secondary)',
            fontSize: '14px', fontWeight: 600,
            cursor: rows.length === 0 ? 'not-allowed' : 'pointer',
            fontFamily: 'var(--sans)', transition: 'all 0.2s',
          }}
        >
          <Icons.Download /> Export CSV
        </button>
        <button
          onClick={handleDownload}
          disabled={rows.length === 0 || generating}
          style={{
            display: 'flex', alignItems: 'center', gap: '8px',
            padding: '12px 28px', borderRadius: '10px',
            background: rows.length === 0 ? 'var(--border)' : generating ? 'var(--border-strong)' : 'linear-gradient(135deg, #c67a2e, #d4893e)',
            color: rows.length === 0 ? 'var(--text-tertiary)' : '#fff',
            border: 'none', fontSize: '14px', fontWeight: 600,
            cursor: rows.length === 0 || generating ? 'not-allowed' : 'pointer',
            boxShadow: rows.length > 0 && !generating ? '0 4px 16px rgba(198,122,46,0.35)' : 'none',
            transition: 'all 0.2s',
            fontFamily: 'var(--sans)',
          }}
        >
          {generating ? <Icons.Loader /> : <Icons.Download />}
          {generating ? 'Generating Report…' : 'Download Report'}
        </button>
      </div>

      {deletedItem && (
        <UndoToast
          message={`Row deleted${deletedItem.row.vendor ? ': ' + deletedItem.row.vendor : ''}`}
          onUndo={undoDelete}
          onDismiss={() => setDeletedItem(null)}
        />
      )}

      {lightboxIndex !== null && (
        <Lightbox
          images={receiptFiles}
          currentIndex={lightboxIndex}
          onClose={() => setLightboxIndex(null)}
          onNavigate={(dir) => setLightboxIndex(prev => Math.max(0, Math.min(receiptFiles.length - 1, prev + dir)))}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
